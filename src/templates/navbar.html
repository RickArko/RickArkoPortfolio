<header class="site-header">
    <div class="site-header__inner">
        <a class="site-brand" href="{{ url_for('home') }}">
            <span class="site-brand__mark">RA</span>
            <span class="site-brand__copy">
                <strong>{{ site.name }}</strong>
                <span>{{ site.headline }}</span>
            </span>
        </a>

        <button
            class="site-header__toggle"
            type="button"
            aria-expanded="false"
            aria-controls="primary-navigation"
            aria-label="Toggle navigation"
        >
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav id="primary-navigation" class="site-nav" aria-label="Primary">
            <a class="{% if page.slug == 'home' %}is-active{% endif %}" href="{{ url_for('home') }}">Home</a>
            <a class="{% if page.slug == 'experience' %}is-active{% endif %}" href="{{ url_for('experience') }}">Experience</a>
            <a class="{% if page.slug == 'projects' %}is-active{% endif %}" href="{{ url_for('projects') }}">Work</a>
            <a class="{% if page.slug == 'blog' %}is-active{% endif %}" href="{{ url_for('blog') }}">Insights</a>
            <a class="site-nav__cta {% if page.slug == 'contact' %}is-active{% endif %}" href="{{ url_for('contact') }}">Let's Talk</a>
        </nav>
    </div>
</header>
