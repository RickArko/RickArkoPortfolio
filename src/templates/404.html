{% extends 'base.html' %}

{% block content %}
<section class="error-state section">
    <div class="error-state__card card" data-reveal>
        <p class="section-eyebrow">404</p>
        <h1>Page Not Found</h1>
        <p>The page you were looking for does not exist, or the link needs updating.</p>
        <div class="hero__actions">
            <a class="button button--primary" href="{{ url_for('home') }}">Back Home</a>
            <a class="button button--secondary" href="{{ url_for('projects') }}">View Work</a>
        </div>
    </div>
</section>
{% endblock %}
