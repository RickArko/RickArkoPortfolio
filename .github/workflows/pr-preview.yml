name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  IMAGE_NAME: rickarko_portfolio
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'rickarko_portfolio' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  APPRUNNER_ACCESS_ROLE_ARN: ${{ vars.APPRUNNER_ACCESS_ROLE_ARN }}

jobs:
  build-preview:
    name: Build And Deploy Preview
    # Only for same-repo PRs (forks cannot assume the AWS role).
    if: >-
      github.event.action != 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      preview_url: ${{ steps.create-preview.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          test -n "$AWS_ROLE_TO_ASSUME" || { echo "Missing AWS_ROLE_TO_ASSUME" >&2; exit 1; }
          test -n "$APPRUNNER_ACCESS_ROLE_ARN" || { echo "Missing APPRUNNER_ACCESS_ROLE_ARN" >&2; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-portfolio-preview
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        env:
          TAG: pr-${{ github.event.pull_request.number }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$TAG" .

      - name: Push image
        env:
          TAG: pr-${{ github.event.pull_request.number }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$TAG"

      - name: Create or reuse preview service
        id: create-preview
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TAG: pr-${{ github.event.pull_request.number }}
        run: |
          url="$(./deployment/bin/preview-create.sh "$PR_NUMBER" "$TAG")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $url"

      - name: Smoke-test the preview
        env:
          PREVIEW_URL: ${{ steps.create-preview.outputs.url }}
        run: |
          ./deployment/bin/smoke-test.sh "$PREVIEW_URL"

      - name: Comment preview URL on the PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview
          message: |
            ### Preview deployed

            - URL: ${{ steps.create-preview.outputs.url }}
            - Image tag: `pr-${{ github.event.pull_request.number }}`
            - Not indexed (`ROBOTS_NOINDEX=1`)
            - Smoke test: passed against the preview host

            The preview will be torn down automatically when this PR closes.

  teardown-preview:
    name: Teardown Preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-portfolio-preview-teardown
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Delete preview service
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ./deployment/bin/preview-destroy.sh "$PR_NUMBER"

      - name: Update PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview
          message: |
            ### Preview torn down

            The ephemeral App Runner service for this PR has been deleted.
